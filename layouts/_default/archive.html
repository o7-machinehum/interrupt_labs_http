<!DOCTYPE html>
<html lang="{{ site.Language.Locale | default "en" }}">
{{ partial "head.html" . }}
<body>
<section class="main">
{{ partial "menu.html" . }}
<article>
    <div class="blog-container">
        <div class="blog-row">
            <div class="blog-content">
                <h1>{{ .Title }}</h1>
                {{ range (where site.RegularPages "Section" "posts").ByDate.Reverse }}
                    {{ partial "article-index.html" . }}
                {{ end }}
            </div>
        </div>
    </div>
</article>
</section>
</body>
</html>
