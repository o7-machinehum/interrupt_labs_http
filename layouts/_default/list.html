<!DOCTYPE html>
<html lang="{{ site.Language.Locale | default "en" }}">
{{ partial "head.html" . }}
<body>
<section class="main">
{{ partial "menu.html" . }}
<article>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <h1>{{ .Title }}</h1>
                {{ range .Pages.ByDate.Reverse }}
                    {{ partial "article-index.html" . }}
                {{ end }}
            </div>
        </div>
    </div>
</article>
</section>
</body>
</html>
