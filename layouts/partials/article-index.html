<div class="post-preview">
    <a href="{{ .RelPermalink }}">
        <h2 class="post-title">
            {{ .Title }}
        </h2>
        {{ with .Params.subtitle }}
            <h3 class="post-subtitle">
                {{ . }}
            </h3>
        {{ end }}
    </a>
    <p class="post-meta">
        {{ with .Params.author }}
            Posted by {{ . }} on
        {{ end }}
        {{ .Date.Format "2006-01-02" }}
    </p>
</div>
<hr>
