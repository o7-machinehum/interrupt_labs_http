<div id="mc_embed_signup">
  <h3>Request a Free Consultation!</h3>
  <form class="contact-form" accept-charset="UTF-8" action="https://getform.io/f/f2e6ca27-2160-4dc8-b510-0eea25c7da2c" method="POST" enctype="multipart/form-data" target="_blank">

    <div class="form-group">
      <label for="exampleInputEmail1" required="required">Email Address </label> <span class="asterisk">*</span>
      <input type="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
    </div>

    <div class="form-group">
      <label for="exampleFormControlSelect1">Required Tech </label> <span class="asterisk">*</span>
      <select class="form-control" id="exampleFormControlSelect1" name="platform" required="required">
          <option>Firmware</option>
          <option>Electrical Engineering</option>
          <option>Robotics</option>
          <option>Linux</option>
      </select>
    </div>

    <div class="form-group">
      <input type="checkbox" id="newsletter" name="newsletter" checked>
      <label for="newsletter">Subscribe to our Newsletter</label>
    </div>

    <div class="form-group">
      <label for="exampleInputName">Message </label> <span class="asterisk">*</span>
      <textarea name="comment" class="form-control contact-form__message" rows="10" cols="50"></textarea>
    </div>

    <div class="clear"><input type="submit" value="Submit" name="submit" id="mc-embedded-subscribe" class="button"></div>
    <br>
  </form>
</div>
