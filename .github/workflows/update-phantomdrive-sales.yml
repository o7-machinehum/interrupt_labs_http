name: Update PhantomDrive sales total

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch sales total
        run: |
          set -euo pipefail

          amount="$(curl --fail --silent --show-error http://139.162.136.197/sold | tr -d '\r\n')"

          if [ -z "$amount" ]; then
            echo "::error::Sales endpoint returned an empty response"
            exit 1
          fi

          mkdir -p static/phantomdrive docs/phantomdrive
          printf '%s\n' "$amount" > static/phantomdrive/sold.txt
          printf '%s\n' "$amount" > docs/phantomdrive/sold.txt

      - name: Commit updated total
        run: |
          set -euo pipefail

          if git diff --quiet -- static/phantomdrive/sold.txt docs/phantomdrive/sold.txt; then
            echo "Sales total unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/phantomdrive/sold.txt docs/phantomdrive/sold.txt
          git commit -m "Update PhantomDrive sales total"
          git push
